<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Documentos - SCONT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-dark: #1e40af;
            --secondary: #0f766e;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --border-radius: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ===== HEADER ===== */
        .header {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            padding: 32px;
            margin-bottom: 32px;
            border-left: 4px solid var(--primary);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            font-size: 32px;
        }

        .config-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            padding: 12px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-size: 14px;
            transition: var(--transition);
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: var(--gray-50);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-800);
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-secondary:hover {
            background: var(--gray-300);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: var(--success);
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-success:hover {
            background: #047857;
        }

        .btn-back {
            background: var(--primary-light);
            color: white;
            padding: 10px 20px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background: var(--primary-dark);
        }

        /* ===== CONTENT ===== */
        .content {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            padding: 32px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--gray-200);
        }

        .content h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
            border-radius: 6px;
            border: 1px solid var(--gray-200);
            flex-wrap: wrap;
            font-size: 14px;
        }

        .breadcrumb-item {
            color: var(--primary-light);
            cursor: pointer;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .breadcrumb-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-dark);
        }

        .breadcrumb-separator {
            color: var(--gray-400);
            font-weight: 300;
        }

        /* ===== ITEMS LIST ===== */
        .items-list {
            display: grid;
            gap: 12px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            transition: var(--transition);
        }

        .item:hover {
            border-color: var(--primary-light);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.02) 0%, rgba(59, 130, 246, 0.05) 100%);
            box-shadow: var(--shadow-sm);
        }

        .item-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .item-icon {
            font-size: 32px;
            min-width: 48px;
            text-align: center;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            color: var(--gray-900);
            font-weight: 600;
            margin-bottom: 6px;
            word-break: break-word;
            cursor: pointer;
            transition: var(--transition);
            font-size: 15px;
        }

        .item-name:hover {
            color: var(--primary-light);
        }

        .item-meta {
            color: var(--gray-500);
            font-size: 12px;
            display: flex;
            gap: 16px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            margin-left: 16px;
        }

        .item-actions button {
            white-space: nowrap;
        }

        /* ===== STATS ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            border-left: 4px solid rgba(255, 255, 255, 0.3);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }

        .spinner {
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--primary-light);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== ALERTS ===== */
        .alert {
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-color: var(--success);
        }

        .alert-error {
            background: #fee2e2;
            color: #7f1d1d;
            border-color: var(--danger);
        }

        .alert-info {
            background: #dbeafe;
            color: #0c2d6b;
            border-color: var(--primary-light);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 12px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray-400);
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--gray-900);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 20px;
            word-break: break-word;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
        }

        .preview-text {
            background: var(--gray-50);
            padding: 16px;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
            line-height: 1.5;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-500);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                padding: 20px;
            }

            .content {
                padding: 20px;
            }

            .config-form {
                grid-template-columns: 1fr;
            }

            .item {
                flex-direction: column;
                align-items: flex-start;
            }

            .item-actions {
                margin-left: 0;
                margin-top: 12px;
                width: 100%;
            }

            .item-actions button {
                flex: 1;
            }

            .breadcrumb {
                font-size: 12px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .header-top {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <h1>
                    <span class="header-icon">📂</span>
                    Gerenciador de Documentos
                </h1>
            </div>
            
            <div class="config-form">
                <div class="form-group">
                    <label>URL Supabase</label>
                    <input type="text" id="supabaseUrl" placeholder="https://seu-projeto.supabase.co" value="https://graxaoomeffhsazuzkvg.supabase.co">
                </div>
                <div class="form-group">
                    <label>Chave de Acesso</label>
                    <input type="password" id="supabaseKey" placeholder="sua-chave-publica">
                </div>
                <div class="form-group">
                    <label>Nome do Bucket</label>
                    <input type="text" id="bucketName" placeholder="documentos" value="documentos">
                </div>
            </div>

            <button class="btn btn-primary" onclick="connectAndLoadFiles()">
                🔗 Conectar e Carregar
            </button>
        </div>

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Stats -->
        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">Itens Totais</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">Tamanho Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPath">-</div>
                <div class="stat-label">Pasta Atual</div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="content-header">
                <h2>Navegador de Arquivos</h2>
            </div>
            
            <!-- Breadcrumb -->
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item" onclick="navigateTo('')">📁 Raiz</span>
            </div>

            <!-- Botão Voltar -->
            <button class="btn btn-back" id="backBtn" onclick="goBack()" style="display: none;">
                ← Voltar
            </button>

            <!-- Items -->
            <div id="itemsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📁</div>
                    <p>Preencha as credenciais e clique em "Conectar e Carregar"</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closePreview()">✕</button>
            <h3 class="modal-title" id="previewTitle"></h3>
            <div id="previewContent"></div>
            <div style="display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="downloadFile()">📥 Baixar</button>
                <button class="btn btn-danger" onclick="deleteFile()">🗑️ Deletar</button>
                <button class="btn btn-secondary" onclick="closePreview()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ESTADO GLOBAL =====
        let supabaseClient = null;
        let allItems = [];
        let currentPath = '';
        let bucketName = '';
        let currentPreviewFile = null;
        let pathHistory = [];






// ===== CONECTAR E CARREGAR (CORRIGIDO) =====
async function connectAndLoadFiles() {
    const url = document.getElementById('supabaseUrl').value;
    const key = document.getElementById('supabaseKey').value;
    bucketName = document.getElementById('bucketName').value;

    if (!url || !key || !bucketName) {
        showAlert('Por favor, preencha todos os campos', 'error');
        return;
    }

    try {
        showAlert('Conectando ao Supabase...', 'info');

        supabaseClient = window.supabase.createClient(url, key);

        // ✅ SOLUÇÃO: Listar recursivamente com limit alto
        const { data, error } = await supabaseClient.storage
            .from(bucketName)
            .list('', { 
                limit: 10000,
                sortBy: { column: 'name', order: 'asc' }
            });

        if (error) {
            throw new Error(error.message);
        }

        // ✅ Incluir todos os itens (pastas e arquivos)
        allItems = data || [];
        
        console.log('✅ Conectado! Total de itens:', allItems.length);
        console.log('Estrutura:', allItems.map(i => i.name));
        
        currentPath = '';
        pathHistory = [];
        
        showAlert('✅ Conectado com sucesso! ' + allItems.length + ' itens encontrados', 'success');
        renderItems();
        updateStats();
    } catch (error) {
        showAlert('❌ Erro: ' + error.message, 'error');
        console.error('Erro completo:', error);
    }
}

// ===== RENDERIZAR ITENS (VERSÃO CORRIGIDA) =====
function renderItems() {
    const container = document.getElementById('itemsContainer');
    const backBtn = document.getElementById('backBtn');

    console.log('=== RENDERIZANDO ===');
    console.log('Caminho atual:', currentPath || 'RAIZ');
    console.log('Total de itens no bucket:', allItems.length);

    // ✅ Separar pastas e arquivos corretamente
    const folders = new Set();
    const files = [];

    allItems.forEach(item => {
        const fullName = item.name;
        
        if (!currentPath) {
            // ===== ESTAMOS NA RAIZ =====
            const parts = fullName.split('/');
            
            if (parts.length === 1) {
                // É um arquivo na raiz
                files.push({
                    name: fullName,
                    fullPath: fullName,
                    size: item.metadata?.size || 0,
                    updated: item.updated_at
                });
            } else if (parts.length > 1) {
                // É uma pasta (primeiro nível)
                folders.add(parts[0]);
            }
        } else {
            // ===== ESTAMOS DENTRO DE UMA PASTA =====
            if (fullName.startsWith(currentPath + '/')) {
                const afterPath = fullName.substring(currentPath.length + 1);
                const parts = afterPath.split('/');
                
                if (parts.length === 1 && parts[0]) {
                    // É um arquivo direto nesta pasta
                    files.push({
                        name: parts[0],
                        fullPath: fullName,
                        size: item.metadata?.size || 0,
                        updated: item.updated_at
                    });
                } else if (parts.length > 1) {
                    // É uma subpasta
                    folders.add(parts[0]);
                }
            }
        }
    });

    console.log('Pastas encontradas:', Array.from(folders));
    console.log('Arquivos encontrados:', files.length);

    // ===== RENDERIZAR =====
    if (folders.size === 0 && files.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <p>Nenhum item encontrado nesta pasta</p>
            </div>
        `;
        backBtn.style.display = currentPath ? 'block' : 'none';
        return;
    }

    let html = '<div class="items-list">';

    // ===== RENDERIZAR PASTAS =====
    const sortedFolders = Array.from(folders).sort();
    sortedFolders.forEach(folderName => {
        const newPath = currentPath ? currentPath + '/' + folderName : folderName;
        
        // Contar itens na pasta
        const itemsInFolder = allItems.filter(item => 
            item.name.startsWith(newPath + '/')
        ).length;

        html += `
            <div class="item" onclick="navigateTo('${newPath}')" style="cursor: pointer;">
                <div class="item-info">
                    <div class="item-icon">📁</div>
                    <div class="item-details">
                        <div class="item-name">
                            ${folderName}
                        </div>
                        <div class="item-meta">
                            <span>Pasta</span>
                            <span>${itemsInFolder} itens</span>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });

    // ===== RENDERIZAR ARQUIVOS =====
    files.forEach(file => {
        const icon = getFileIcon(file.name);
        const size = formatFileSize(file.size);
        const date = file.updated ? new Date(file.updated).toLocaleDateString('pt-BR') : 'N/A';

        html += `
            <div class="item">
                <div class="item-info">
                    <div class="item-icon">${icon}</div>
                    <div class="item-details">
                        <div class="item-name" onclick="previewFile('${file.fullPath}', '${file.name}')">
                            ${file.name}
                        </div>
                        <div class="item-meta">
                            <span>${size}</span>
                            <span>${date}</span>
                        </div>
                    </div>
                </div>
                <div class="item-actions">
                    <button class="btn btn-success" onclick="event.stopPropagation(); previewFile('${file.fullPath}', '${file.name}')">👁️ Ver</button>
                    <button class="btn btn-primary" onclick="event.stopPropagation(); downloadFileByPath('${file.fullPath}', '${file.name}')">📥 Baixar</button>
                    <button class="btn btn-danger" onclick="event.stopPropagation(); deleteFileByPath('${file.fullPath}')">🗑️ Deletar</button>
                </div>
            </div>
        `;
    });

    html += '</div>';
    container.innerHTML = html;

    backBtn.style.display = currentPath ? 'block' : 'none';
    updateBreadcrumb();
}

// ===== NAVEGAÇÃO (CORRIGIDA) =====
function navigateTo(path) {
    console.log('🔄 Navegando para:', path);
    
    if (currentPath) {
        pathHistory.push(currentPath);
    }
    
    currentPath = path;
    console.log('Novo caminho:', currentPath);
    
    renderItems();
    updateStats();
    
    // Scroll para o topo
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
    console.log('⬅️ Voltando...');
    console.log('Histórico:', pathHistory);
    
    if (pathHistory.length > 0) {
        currentPath = pathHistory.pop();
    } else {
        currentPath = '';
    }
    
    console.log('Novo caminho:', currentPath);
    renderItems();
    updateStats();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}














        // ===== BREADCRUMB =====
        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="navigateTo(\'\')">📁 Raiz</span>';

            if (currentPath) {
                const parts = currentPath.split('/');
                let accumulated = '';

                parts.forEach((part, index) => {
                    accumulated += (accumulated ? '/' : '') + part;
                    html += '<span class="breadcrumb-separator">/</span>';
                    html += `<span class="breadcrumb-item" onclick="navigateTo('${accumulated}')">${part}</span>`;
                });
            }

            breadcrumb.innerHTML = html;
        }

        // ===== VISUALIZAR ARQUIVO =====
        async function previewFile(filePath, fileName) {
            try {
                currentPreviewFile = { filePath, fileName };
                const modal = document.getElementById('previewModal');
                const previewContent = document.getElementById('previewContent');
                const previewTitle = document.getElementById('previewTitle');

                previewTitle.textContent = fileName;
                previewContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando...</p></div>';
                modal.classList.add('active');

                const { data, error } = await supabaseClient.storage
                    .from(bucketName)
                    .createSignedUrl(filePath, 3600);

                if (error) throw error;

                const url = data.signedUrl;
                const ext = fileName.split('.').pop().toLowerCase();

                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                    previewContent.innerHTML = `<img src="${url}" class="preview-image" alt="${fileName}">`;
                } else if (['pdf'].includes(ext)) {
                    previewContent.innerHTML = `
                        <iframe src="${url}" style="width: 100%; height: 500px; border: 1px solid #e5e7eb; border-radius: 8px;"></iframe>
                    `;
                } else if (['txt', 'json', 'csv', 'xml', 'html', 'css', 'js'].includes(ext)) {
                    const response = await fetch(url);
                    const text = await response.text();
                    previewContent.innerHTML = `<div class="preview-text">${escapeHtml(text)}</div>`;
                } else {
                    previewContent.innerHTML = `
                        <p style="margin-bottom: 16px;">Tipo de arquivo não suportado para visualização</p>
                        <a href="${url}" target="_blank" class="btn btn-primary">Abrir em nova aba</a>
                    `;
                }
            } catch (error) {
                document.getElementById('previewContent').innerHTML = `<p style="color: #dc2626;">Erro: ${error.message}</p>`;
            }
        }

        // ===== BAIXAR ARQUIVO =====
        async function downloadFileByPath(filePath, fileName) {
            try {
                const { data, error } = await supabaseClient.storage
                    .from(bucketName)
                    .createSignedUrl(filePath, 3600);

                if (error) throw error;

                const a = document.createElement('a');
                a.href = data.signedUrl;
                a.download = fileName;
                a.click();

                showAlert('✅ Download iniciado!', 'success');
            } catch (error) {
                showAlert('❌ Erro ao baixar: ' + error.message, 'error');
            }
        }

        async function downloadFile() {
            if (!currentPreviewFile) return;
            await downloadFileByPath(currentPreviewFile.filePath, currentPreviewFile.fileName);
        }

        // ===== DELETAR ARQUIVO =====
        async function deleteFileByPath(filePath) {
            if (!confirm('Tem certeza que deseja deletar este arquivo?')) return;

            try {
                const { error } = await supabaseClient.storage
                    .from(bucketName)
                    .remove([filePath]);

                if (error) throw error;

                showAlert('✅ Arquivo deletado com sucesso!', 'success');
                closePreview();
                await connectAndLoadFiles();
            } catch (error) {
                showAlert('❌ Erro ao deletar: ' + error.message, 'error');
            }
        }

        async function deleteFile() {
            if (!currentPreviewFile) return;
            await deleteFileByPath(currentPreviewFile.filePath);
        }

        // ===== FECHAR PREVIEW =====
        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
            currentPreviewFile = null;
        }

        // ===== ATUALIZAR STATS =====
        function updateStats() {
            const totalSize = allItems.reduce((sum, item) => sum + (item.metadata?.size || 0), 0);

            document.getElementById('totalItems').textContent = allItems.length;
            document.getElementById('totalSize').textContent = formatFileSize(totalSize);
            document.getElementById('currentPath').textContent = currentPath || 'Raiz';
            document.getElementById('stats').style.display = 'grid';
        }

        // ===== UTILITÁRIOS =====
        function getFileIcon(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📄',
                doc: '📋',
                docx: '📋',
                xls: '📊',
                xlsx: '📊',
                ppt: '🎯',
                pptx: '🎯',
                jpg: '🖼️',
                jpeg: '🖼️',
                png: '🖼️',
                gif: '🖼️',
                mp4: '🎬',
                mp3: '🎵',
                zip: '📦',
                rar: '📦',
                txt: '📝',
                json: '⚙️',
                csv: '📈',
                html: '🌐',
                css: '🎨',
                js: '⚡'
            };
            return icons[ext] || '📁';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;

            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
