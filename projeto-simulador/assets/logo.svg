<!-- assets/logo.svg -->
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo circular -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AA8C2C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0D0D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo externo dourado -->
  <circle cx="100" cy="100" r="95" fill="url(#goldGradient)" opacity="0.15"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Fundo preto -->
  <circle cx="100" cy="100" r="85" fill="url(#darkGradient)"/>
  
  <!-- Letra H -->
  <g transform="translate(50, 70)">
    <!-- Barra vertical esquerda -->
    <rect x="0" y="0" width="8" height="60" fill="url(#goldGradient)" rx="2"/>
    <!-- Barra horizontal -->
    <rect x="0" y="26" width="40" height="8" fill="url(#goldGradient)" rx="2"/>
    <!-- Barra vertical direita -->
    <rect x="32" y="0" width="8" height="60" fill="url(#goldGradient)" rx="2"/>
  </g>
  
  <!-- Letra L -->
  <g transform="translate(100, 70)">
    <!-- Barra vertical -->
    <rect x="0" y="0" width="8" height="60" fill="url(#goldGradient)" rx="2"/>
    <!-- Barra horizontal -->
    <rect x="0" y="52" width="32" height="8" fill="url(#goldGradient)" rx="2"/>
  </g>
  
  <!-- Símbolo de moeda (círculo com cifrão) -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <text x="0" y="4" font-size="14" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" font-family="Arial">$</text>
  </g>
  
  <!-- Texto "HL" em dourado -->
  <text x="100" y="175" font-size="14" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="2">HL</text>
</svg>